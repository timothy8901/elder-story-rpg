<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elder-Story-RPG</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0d12;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: monospace;
        color: #9aa4b2;
      }
      #game {
        background: #6ec6f5;
        /* Smooth upscaling suits the gradient/vector art. */
        image-rendering: auto;
        box-shadow: 0 0 0 2px #1c2230, 0 14px 48px rgba(0, 0, 0, 0.6);
        max-width: 100vw;
        max-height: 100vh;
      }
    </style>
  </head>
  <body>
    <!-- Internal resolution is fixed; CSS only scales the element to fit the window. -->
    <canvas id="game" width="960" height="540"></canvas>
    <!-- Compiled by `tsc` from src/ into dist/. Loaded as a native ES module. -->
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
