<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FableQuest RPG</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100vh;
        background: #0b0d12;
        font-family: monospace;
        color: #ffffff;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        gap: 14px;
        padding: 14px 8px;
        box-sizing: border-box;
      }
      #game {
        background: #6ec6f5;
        /* Crisp upscaling so the pixel art stays sharp when the canvas is scaled. */
        image-rendering: pixelated;
        image-rendering: crisp-edges; /* fallback for older engines */
        box-shadow: 0 0 0 2px #1c2230, 0 14px 48px rgba(0, 0, 0, 0.6);
        max-width: 100vw;
        max-height: 80vh;
      }
      /* FableQuest RPG title wordmark, above the game screen. */
      #logo {
        width: min(92vw, 560px);
        height: auto;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        margin: 2px 0 -2px;
      }
      /* Keyboard controls legend, shown below the game screen. */
      #controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px 14px;
        max-width: 960px;
        color: #ffffff;
        font-size: 13px;
        line-height: 1.6;
      }
      #controls span {
        white-space: nowrap;
      }
      #controls kbd {
        display: inline-block;
        min-width: 12px;
        padding: 1px 6px;
        background: #1c2230;
        border: 1px solid #3a4660;
        border-bottom-width: 2px;
        border-radius: 4px;
        color: #ffffff;
        font-size: 12px;
      }
      /* Studio banner, beneath the controls. */
      #banner {
        width: min(96vw, 960px);
        height: auto;
        image-rendering: pixelated;
        border-radius: 6px;
      }
      /* Cross-promo: more from Not Tim Games. */
      #studio-links {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        margin: 2px 0 18px;
      }
      #studio-links .label {
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #6b7689;
      }
      #studio-links a {
        color: #41e8ff;
        text-decoration: none;
        font-size: 14px;
        letter-spacing: 0.06em;
        padding-bottom: 2px;
        border-bottom: 1px solid transparent;
        transition: color 0.15s ease, border-color 0.15s ease;
      }
      #studio-links a:hover {
        color: #ffffff;
        border-color: #41e8ff;
      }
    </style>
  </head>
  <body>
    <!-- Game title wordmark (FableQuest RPG). -->
    <img id="logo" src="./assets/logo.png" alt="FableQuest RPG" />

    <!-- Internal resolution is fixed; CSS only scales the element to fit the window. -->
    <canvas id="game" width="960" height="540"></canvas>

    <!-- Keyboard controls (white text, below the game screen). -->
    <div id="controls">
      <span><kbd>←</kbd><kbd>→</kbd> / <kbd>A</kbd><kbd>D</kbd> Move</span>
      <span><kbd>Space</kbd> Jump</span>
      <span><kbd>↓</kbd>+<kbd>Jump</kbd> Drop through</span>
      <span><kbd>J</kbd> Attack</span>
      <span><kbd>K</kbd> Cast</span>
      <span><kbd>Q</kbd> Cycle spell</span>
      <span><kbd>Z</kbd> Shout</span>
      <span><kbd>V</kbd> Cycle shout</span>
      <span><kbd>L</kbd> Block</span>
      <span><kbd>Shift</kbd> Sneak</span>
      <span><kbd>F</kbd> Potion</span>
      <span><kbd>R</kbd> Beast Form</span>
      <span><kbd>E</kbd> Talk</span>
      <span><kbd>I</kbd> Menu</span>
      <span><kbd>P</kbd> Save</span>
      <span><kbd>X</kbd> Reset (×2)</span>
      <span><kbd>`</kbd> Debug</span>
    </div>

    <!-- Studio banner (pixel-art logo), beneath the controls. -->
    <canvas id="banner" width="480" height="250" role="img" aria-label="Not Tim Games"></canvas>
    <script src="./assets/banner.js"></script>

    <!-- Cross-promo to the studio's other game. -->
    <nav id="studio-links">
      <span class="label">More from Not Tim Games</span>
      <a href="https://timothy8901.github.io/robo-revolution/">▸ Play Robo Revolution</a>
    </nav>

    <!-- Compiled by `tsc` from src/ into dist/. Loaded as a native ES module. -->
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
